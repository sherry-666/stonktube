<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;} body{margin:0;}</style>
</helmet>

<div style="min-width:100%;width:max-content;min-height:100vh;box-sizing:border-box;padding:56px;background:#E7E5DF;font-family:'Plus Jakarta Sans',sans-serif;">

  <div style="margin-bottom:8px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:26px;color:#14151A;letter-spacing:-0.02em;">StonkTube — icon directions</div>
  <div style="margin-bottom:40px;font-size:15px;color:#6E6F78;">Play button × rising stock line. Pick a direction and I'll wire it into the app + export sizes.</div>

  <!-- ROW 1: the marks at hero size -->
  <div style="display:flex;gap:40px;align-items:flex-start;">

    <!-- A: Play + arrow line piercing -->
    <div style="flex:none;width:300px;">
      <div style="font-size:12px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#9A9BA4;margin-bottom:14px;">A · Play + stonk line</div>
      <div style="background:#fff;border-radius:2px;box-shadow:0 1px 3px rgba(0,0,0,.08);padding:34px;display:flex;justify-content:center;">
        <svg width="200" height="200" viewBox="0 0 100 100">
          <rect x="2" y="2" width="96" height="96" rx="26" fill="#14151A"></rect>
          <polyline points="20,80 34,71 48,74 64,47 80,25" fill="none" stroke="#23D17F" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"></polyline>
          <path d="M70 25 L80 25 L80 35" fill="none" stroke="#23D17F" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"></path>
          <path d="M40 31 L40 63 L67 47 Z" fill="#fff"></path>
        </svg>
      </div>
    </div>

    <!-- B: Play triangle doubling as up-right arrow -->
    <div style="flex:none;width:300px;">
      <div style="font-size:12px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#9A9BA4;margin-bottom:14px;">B · Up-play (triangle = arrow)</div>
      <div style="background:#fff;border-radius:2px;box-shadow:0 1px 3px rgba(0,0,0,.08);padding:34px;display:flex;justify-content:center;">
        <svg width="200" height="200" viewBox="0 0 100 100">
          <rect x="2" y="2" width="96" height="96" rx="26" fill="#E5322D"></rect>
          <g transform="rotate(-45 50 50)">
            <path d="M40 33 L40 67 L70 50 Z" fill="#fff"></path>
          </g>
          <polyline points="26,74 26,52" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" opacity="0.55"></polyline>
          <polyline points="40,74 40,44" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" opacity="0.55"></polyline>
        </svg>
      </div>
    </div>

    <!-- C: Candlestick play -->
    <div style="flex:none;width:300px;">
      <div style="font-size:12px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#9A9BA4;margin-bottom:14px;">C · Play on candles</div>
      <div style="background:#fff;border-radius:2px;box-shadow:0 1px 3px rgba(0,0,0,.08);padding:34px;display:flex;justify-content:center;">
        <svg width="200" height="200" viewBox="0 0 100 100">
          <rect x="2" y="2" width="96" height="96" rx="26" fill="#0E1320"></rect>
          <g stroke-linecap="round">
            <line x1="26" y1="60" x2="26" y2="82" stroke="#2A3550" stroke-width="3"></line>
            <rect x="21" y="64" width="10" height="14" rx="2" fill="#2A3550"></rect>
            <line x1="44" y1="50" x2="44" y2="78" stroke="#2A3550" stroke-width="3"></line>
            <rect x="39" y="56" width="10" height="16" rx="2" fill="#2A3550"></rect>
            <line x1="74" y1="40" x2="74" y2="74" stroke="#23D17F" stroke-width="3"></line>
            <rect x="69" y="46" width="10" height="20" rx="2" fill="#23D17F"></rect>
          </g>
          <path d="M40 30 L40 58 L64 44 Z" fill="#fff"></path>
        </svg>
      </div>
    </div>

  </div>

  <!-- ROW 2: context — app tiles, small sizes, in nav -->
  <div style="margin-top:48px;font-size:12px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#9A9BA4;margin-bottom:14px;">Context — direction A at real sizes</div>
  <div style="background:#fff;border-radius:2px;box-shadow:0 1px 3px rgba(0,0,0,.08);padding:32px;display:flex;align-items:center;gap:44px;flex-wrap:wrap;">

    <!-- app icon tile big -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
      <svg width="96" height="96" viewBox="0 0 100 100" style="border-radius:22px;box-shadow:0 8px 22px -6px rgba(20,21,26,0.35);">
        <rect x="0" y="0" width="100" height="100" fill="#14151A"></rect>
        <polyline points="20,80 34,71 48,74 64,47 80,25" fill="none" stroke="#23D17F" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"></polyline>
        <path d="M70 25 L80 25 L80 35" fill="none" stroke="#23D17F" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"></path>
        <path d="M40 31 L40 63 L67 47 Z" fill="#fff"></path>
      </svg>
      <span style="font-size:12px;color:#9A9BA4;">App · 96px</span>
    </div>

    <!-- favicon sizes -->
    <div style="display:flex;align-items:flex-end;gap:18px;">
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
        <svg width="48" height="48" viewBox="0 0 100 100" style="border-radius:12px;">
          <rect x="0" y="0" width="100" height="100" fill="#14151A"></rect>
          <polyline points="20,80 34,71 48,74 64,47 80,25" fill="none" stroke="#23D17F" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round"></polyline>
          <path d="M70 25 L80 25 L80 35" fill="none" stroke="#23D17F" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round"></path>
          <path d="M40 31 L40 63 L67 47 Z" fill="#fff"></path>
        </svg>
        <span style="font-size:11px;color:#9A9BA4;">48</span>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
        <svg width="28" height="28" viewBox="0 0 100 100" style="border-radius:8px;">
          <rect x="0" y="0" width="100" height="100" fill="#14151A"></rect>
          <polyline points="20,80 34,71 48,74 64,47 80,26" fill="none" stroke="#23D17F" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"></polyline>
          <path d="M69 26 L80 26 L80 37" fill="none" stroke="#23D17F" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"></path>
          <path d="M40 31 L40 63 L66 47 Z" fill="#fff"></path>
        </svg>
        <span style="font-size:11px;color:#9A9BA4;">28</span>
      </div>
    </div>

    <!-- nav lockup -->
    <div style="display:flex;flex-direction:column;align-items:flex-start;gap:10px;">
      <div style="display:flex;align-items:center;gap:11px;background:#F6F6F2;border:1px solid #ECEBE4;border-radius:12px;padding:12px 18px;">
        <svg width="32" height="32" viewBox="0 0 100 100" style="border-radius:9px;">
          <rect x="0" y="0" width="100" height="100" fill="#14151A"></rect>
          <polyline points="20,80 34,71 48,74 64,47 80,25" fill="none" stroke="#23D17F" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"></polyline>
          <path d="M70 25 L80 25 L80 35" fill="none" stroke="#23D17F" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"></path>
          <path d="M40 31 L40 63 L67 47 Z" fill="#fff"></path>
        </svg>
        <span style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:21px;letter-spacing:-0.02em;color:#14151A;">StonkTube</span>
      </div>
      <span style="font-size:12px;color:#9A9BA4;">Nav lockup</span>
    </div>

    <!-- on light tile variant -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
      <svg width="96" height="96" viewBox="0 0 100 100" style="border-radius:22px;box-shadow:0 8px 22px -6px rgba(20,21,26,0.2);border:1px solid #ECEBE4;">
        <rect x="0" y="0" width="100" height="100" fill="#fff"></rect>
        <polyline points="20,80 34,71 48,74 64,47 80,25" fill="none" stroke="#1AB46B" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"></polyline>
        <path d="M70 25 L80 25 L80 35" fill="none" stroke="#1AB46B" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"></path>
        <path d="M40 31 L40 63 L67 47 Z" fill="#14151A"></path>
      </svg>
      <span style="font-size:12px;color:#9A9BA4;">Light tile</span>
    </div>

  </div>

</div>
</x-dc>
</body>
</html>
